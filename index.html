<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIC-TAC-TOE</title>
    <link rel="stylesheet" href="TOE.css">
    <link rel="icon" type="image/x-icon" href="tic_tac_toe_img.png">
</head>

<body>
    <h1 class="header">TIC-TAC-TOE</h1>
    <div class="turn-holder">
        <div class="turn">Game begins!</div>
    </div>
    <div class="dummy">
        <div class="container">
            <div class="child" data-index="0"></div>
            <div class="child" data-index="1"></div>
            <div class="child" data-index="2"></div>
            <div class="child" data-index="3"></div>
            <div class="child" data-index="4"></div>
            <div class="child" data-index="5"></div>
            <div class="child" data-index="6"></div>
            <div class="child" data-index="7"></div>
            <div class="child" data-index="8"></div>
        </div>
    </div>
    <div class="turn-holder">
        <div class="footer">
            Status: Game is in progress!
        </div>
    </div>
    <script src="TAC.js"></script>
</body>

</html>
